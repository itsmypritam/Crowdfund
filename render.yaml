services:
  - type: web
    name: stellar-tip-jar
    runtime: ruby
    repo: https://github.com/itsmypritam/-stellar-tip-jar
    branch: master
    buildCommand: cd backend && bundle install
    startCommand: cd backend && bundle exec puma -p $PORT config.ru
    envVars:
      - key: CONTRACT_ID
        sync: false
      - key: STELLAR_NETWORK
        value: testnet
