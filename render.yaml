services:
  - type: web
    name: stellar-tip-jar
    runtime: node
    repo: https://github.com/itsmypritam/-stellar-tip-jar
    branch: master
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: CONTRACT_ID
        sync: false
      - key: STELLAR_NETWORK
        value: testnet
